name: Regime Crypto Trader Paper Trade

on:
  workflow_dispatch:
    inputs:
      execute_orders:
        description: "Submit Alpaca paper orders"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # V26 uses daily crypto bars. Run after the UTC daily bar closes.
    - cron: "15 0 * * *"

permissions:
  contents: write

concurrency:
  group: regime-crypto-trader-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regime crypto paper trader
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID || secrets.ALPACA_API_KEY || secrets.ALPACA_REGIME_CRYPTO_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY || secrets.ALPACA_REGIME_CRYPTO_SECRET_KEY }}
          APCA_API_BASE_URL: ${{ vars.APCA_API_BASE_URL || 'https://paper-api.alpaca.markets' }}
          MODEL_NOTIONAL: ${{ vars.MODEL_NOTIONAL || '1000000' }}
          DEFAULT_ACCOUNT_VALUE: ${{ vars.DEFAULT_ACCOUNT_VALUE || '1000000' }}
          EXECUTE_PAPER_ORDERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execute_orders || vars.EXECUTE_PAPER_ORDERS || 'false' }}
          SUBMIT_ORDERS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execute_orders || vars.SUBMIT_ORDERS || 'false' }}
          STRATEGY_KILL_SWITCH: ${{ vars.STRATEGY_KILL_SWITCH || 'false' }}
        run: python run_daily.py

      - name: Commit dashboard logs
        if: always()
        run: |
          git config user.name "regime-crypto-trader-bot"
          git config user.email "regime-crypto-trader-bot@users.noreply.github.com"
          git add logs/
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "Update regime crypto trader dashboard logs"
            git pull --rebase origin main || true
            git push
          fi
